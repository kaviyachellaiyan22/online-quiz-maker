<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Quiz App</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background:#f4f6f9;
    transition:0.3s;
}
.dark{
    background:#1e1e1e;
    color:white;
}
header{
    background:#34495e;
    color:white;
    padding:15px;
    text-align:center;
}
.container{padding:20px;}
button{
    padding:10px 15px;
    margin:5px 0;
    border:none;
    background:#3498db;
    color:white;
    cursor:pointer;
    border-radius:5px;
}
button:hover{background:#2980b9;}
.hidden{display:none;}
.quiz-card{
    background:white;
    padding:15px;
    margin:10px 0;
    border-radius:8px;
}
.dark .quiz-card{background:#2c2c2c;}
.option{margin:5px 0;}
.progress{
    height:10px;
    background:#ccc;
    border-radius:5px;
    margin:10px 0;
}
.progress-bar{
    height:10px;
    background:#27ae60;
    width:0%;
    border-radius:5px;
}
.timer{
    font-weight:bold;
    color:red;
}
</style>
</head>

<body>

<header>
<h2>🚀 Innovative Quiz App</h2>
<button onclick="toggleDark()">🌙 Toggle Mode</button>
</header>

<div class="container">

<div id="home">
<h3>Welcome</h3>
<input id="username" placeholder="Enter your name">
<select id="level">
<option value="easy">Easy</option>
<option value="medium">Medium</option>
<option value="hard">Hard</option>
</select>
<button onclick="startQuiz()">Start Quiz</button>
<button onclick="showLeaderboard()">Leaderboard</button>
</div>

<div id="quizPage" class="hidden">
<h3 id="questionText"></h3>
<div class="timer">Time: <span id="time">15</span>s</div>
<div class="progress"><div class="progress-bar" id="progressBar"></div></div>
<div id="options"></div>
<button onclick="nextQuestion()">Next</button>
</div>

<div id="resultPage" class="hidden">
<h3>Results</h3>
<p id="resultText"></p>
<button onclick="goHome()">Home</button>
</div>

<div id="leaderboardPage" class="hidden">
<h3>🏆 Top 5 Leaderboard</h3>
<ul id="leaderboardList"></ul>
<button onclick="goHome()">Home</button>
</div>

</div>

<script>
let questions={
easy:[
{q:"2 + 2 ?", o:["3","4","5","6"], a:1},
{q:"Capital of India?", o:["Delhi","Mumbai","Chennai","Kolkata"], a:0}
],
medium:[
{q:"HTML stands for?", o:["Hyper Text Markup Language","HighText","Hyper Tab","None"], a:0},
{q:"5 * 6 ?", o:["11","30","60","25"], a:1}
],
hard:[
{q:"Which is not JS framework?", o:["React","Angular","Laravel","Vue"], a:2},
{q:"Binary of 5?", o:["101","110","111","100"], a:0}
]
};

let currentQuestions=[];
let index=0;
let score=0;
let timer;
let timeLeft=15;

function startQuiz(){
let level=document.getElementById("level").value;
currentQuestions=questions[level];
index=0;score=0;
hideAll();
document.getElementById("quizPage").classList.remove("hidden");
showQuestion();
startTimer();
}

function showQuestion(){
let q=currentQuestions[index];
document.getElementById("questionText").innerText=q.q;
let optDiv=document.getElementById("options");
optDiv.innerHTML="";
q.o.forEach((opt,i)=>{
optDiv.innerHTML+=`
<div class="option">
<input type="radio" name="answer" value="${i}"> ${opt}
</div>`;
});
updateProgress();
}

function nextQuestion(){
let selected=document.querySelector('input[name="answer"]:checked');
if(selected && parseInt(selected.value)===currentQuestions[index].a){
score++;
}
index++;
if(index<currentQuestions.length){
showQuestion();
resetTimer();
}else{
endQuiz();
}
}

function startTimer(){
timeLeft=15;
document.getElementById("time").innerText=timeLeft;
timer=setInterval(()=>{
timeLeft--;
document.getElementById("time").innerText=timeLeft;
if(timeLeft<=0){
nextQuestion();
}
},1000);
}

function resetTimer(){
clearInterval(timer);
startTimer();
}

function endQuiz(){
clearInterval(timer);
hideAll();
document.getElementById("resultPage").classList.remove("hidden");
let percent=Math.round((score/currentQuestions.length)*100);
let msg=percent>=90?"Excellent 🎉":percent>=60?"Good 👍":"Practice More 📚";
document.getElementById("resultText").innerText=
`Score: ${score}/${currentQuestions.length} (${percent}%) - ${msg}`;
saveScore(percent);
}

function updateProgress(){
let percent=(index/currentQuestions.length)*100;
document.getElementById("progressBar").style.width=percent+"%";
}

function toggleDark(){
document.body.classList.toggle("dark");
}

function hideAll(){
document.querySelectorAll(".container > div").forEach(div=>div.classList.add("hidden"));
}

function goHome(){
hideAll();
document.getElementById("home").classList.remove("hidden");
}

function saveScore(percent){
let name=document.getElementById("username").value||"Guest";
let leaderboard=JSON.parse(localStorage.getItem("leaderboard"))||[];
leaderboard.push({name,percent});
leaderboard.sort((a,b)=>b.percent-a.percent);
leaderboard=leaderboard.slice(0,5);
localStorage.setItem("leaderboard",JSON.stringify(leaderboard));
}

function showLeaderboard(){
hideAll();
document.getElementById("leaderboardPage").classList.remove("hidden");
let leaderboard=JSON.parse(localStorage.getItem("leaderboard"))||[];
let list=document.getElementById("leaderboardList");
list.innerHTML="";
leaderboard.forEach(player=>{
list.innerHTML+=`<li>${player.name} - ${player.percent}%</li>`;
});
}
</script>

</body>
</html>
